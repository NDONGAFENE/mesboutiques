<script>
// ═══ FIREBASE CONFIG ═══
// ⚠️ REMPLACEZ CES VALEURS PAR VOTRE CONFIG FIREBASE
var FIREBASE_CONFIG = {
  apiKey: "AIzaSyCZ19gUXJDbubMyx_1UPBKeTez6eRD8JTM",
  authDomain: "mesboutiques-c7e26.firebaseapp.com",
  projectId: "mesboutiques-c7e26",
  storageBucket: "mesboutiques-c7e26.appspot.com",
  messagingSenderId: "744248015779",
  appId: "1:744248015779:web:a39126fdb49b145c7ed216"
};

var FB_READY = false;
var db_fb = null;

function initFirebase(){
  try{
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    db_fb = firebase.firestore();
    FB_READY = true;
    console.log('✅ Firebase connecté');
    showNetStatus('firebase');
    return true;
  } catch(e){
    console.warn('Firebase non configuré — mode local:', e.message);
    FB_READY = false;
    showNetStatus('local');
    return false;
  }
}

// ═══ SYNC FIREBASE ═══
function saveToFirebase(boutique, collection, data){
  if(!FB_READY||!db_fb)return;
  var coll = 'boutique_'+boutique+'_'+collection;
  // Sauvegarder tout le tableau en un seul document
  db_fb.collection('mesboutiques').doc(coll).set({data:data,updated:new Date().toISOString()})
    .then(function(){showSaveStatus();})
    .catch(function(e){console.warn('Erreur Firebase save:',e);});
}

function loadFromFirebase(boutique, collection, callback){
  if(!FB_READY||!db_fb){callback(null);return;}
  var coll = 'boutique_'+boutique+'_'+collection;
  db_fb.collection('mesboutiques').doc(coll).get()
    .then(function(doc){
      if(doc.exists&&doc.data().data) callback(doc.data().data);
      else callback(null);
    })
    .catch(function(){callback(null);});
}

// Écouter les changements en temps réel
function listenFirebase(boutique, collection, callback){
  if(!FB_READY||!db_fb)return;
  var coll = 'boutique_'+boutique+'_'+collection;
  db_fb.collection('mesboutiques').doc(coll)
    .onSnapshot(function(doc){
      if(doc.exists&&doc.data().data) callback(doc.data().data);
    });
}

function showNetStatus(mode){
  var el=document.getElementById('net-status');
  if(!el)return;
  if(mode==='firebase') el.innerHTML='<span style="color:#00b87a">🔥 Firebase connecté</span>';
  else if(mode==='online') el.innerHTML='<span style="color:#3498db">🌐 En ligne</span>';
  else el.innerHTML='<span style="color:#f0b429">💾 Mode local (hors ligne)</span>';
}

// ═══ CONFIG ═══

// ═══ LOGIN ═══
function selShop(n){
  SHOP_SEL=n;
  document.querySelectorAll('.shop-btn').forEach(function(b){b.classList.remove('sel');});
  document.getElementById('sb'+(n===0?'0':n)).classList.add('sel');
}
function login(){
  var pw=document.getElementById('lpw').value;
  if(SHOP_SEL===0&&pw===PWD.admin){SESSION={role:'admin',shop:0};startApp();}
  else if(SHOP_SEL===1&&pw===PWD.b1){SESSION={role:'b1',shop:1};startApp();}
  else if(SHOP_SEL===2&&pw===PWD.b2){SESSION={role:'b2',shop:2};startApp();}
  else{document.getElementById('la').innerHTML='<div class="alert ae">Mot de passe incorrect.</div>';}
}
function logout(){
  SESSION=null;
  document.getElementById('app').style.display='none';
  document.getElementById('login').style.display='flex';
  document.getElementById('lpw').value='';
  document.getElementById('la').innerHTML='';
}

// ═══ APP ═══
function db(){
  if(!SESSION)return{produits:[],ventes:[],achats:[],caisse:[],dettes:[],fournisseurs:[]};
  if(SESSION.role==='admin'&&SESSION.activeShop)return DB['b'+SESSION.activeShop];
  if(SESSION.role==='admin')return DB.b1;
  return DB[SESSION.role];
}
function shopName(){
  var s=SESSION.role==='admin'?SESSION.activeShop||1:SESSION.shop;
  return s===1?'Quincaillerie 1':'Quincaillerie 2';
}
function nextId(arr){return arr.length?Math.max.apply(null,arr.map(function(x){return x.id;}))+1:1;}
function fmt(n){return(n||0).toLocaleString('fr-FR')+' FCFA';}

function startApp(){
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  if(SESSION.role==='admin')SESSION.activeShop=1;
  document.getElementById('sb-role').textContent=SESSION.role==='admin'?'⚙️ Administrateur':SESSION.role==='b1'?'🔨 Quincaillerie 1':'🔧 Quincaillerie 2';
  document.getElementById('sb-name').textContent=SESSION.role==='admin'?'Admin Principal':'Gérant';
  buildNav();go('db');
}
function buildNav(){
  var h='';
  if(SESSION.role==='admin'){
    h+=ns('Boutiques');
    h+='<button class="na" onclick="swShop(1)" id="nsw1"><span class="ni">🔨</span>Quincaillerie 1</button>';
    h+='<button class="na" onclick="swShop(2)" id="nsw2"><span class="ni">🔧</span>Quincaillerie 2</button>';
  }
  h+=ns('Gestion');
  h+=ni('db','📊','Tableau de bord');
  h+=ni('stock','📦','Stock & Produits');
  h+=ni('vente','🛒','Point de Vente');
  h+=ni('achats','🚚','Achats & Entrées');
  h+=ni('caisse','💰','Caisse');
  h+=ni('dettes','📋','Dettes & Créances');
  h+=ni('fournisseurs','🤝','Fournisseurs');
  h+=ns('Analyses');
  h+=ni('rapports','📈','Rapports');
  if(SESSION.role==='admin'){h+=ns('Administration');h+=ni('admin_view','👁️','Vue globale');}
  document.getElementById('nav').innerHTML=h;
  updateShopDisplay();
}
function ns(t){return '<div class="ns">'+t+'</div>';}
function ni(p,i,l){return '<button class="na" onclick="go(\''+p+'\')" id="n'+p+'"><span class="ni">'+i+'</span>'+l+'</button>';}
function swShop(n){
  SESSION.activeShop=n;
  updateShopDisplay();go('db');
}
function updateShopDisplay(){
  var sn=shopName();
  document.getElementById('sb-shop').textContent=sn;
  if(SESSION.role==='admin'){
    var s=SESSION.activeShop||1;
    document.getElementById('nsw1').classList.toggle('on',s===1);
    document.getElementById('nsw2').classList.toggle('on',s===2);
  }
}
function go(p){
  document.querySelectorAll('.na').forEach(function(a){a.classList.remove('on');});
  var b=document.getElementById('n'+p);if(b)b.classList.add('on');
  var pages={db:pgDb,stock:pgStock,vente:pgVente,achats:pgAchats,caisse:pgCaisse,dettes:pgDettes,fournisseurs:pgFourn,rapports:pgRapports,admin_view:pgAdminView};
  if(pages[p])pages[p]();else pgDb();
}
function ST(t){document.getElementById('pt').textContent=t;}
function SA(h){document.getElementById('pa').innerHTML=h;}
function SC(h){document.getElementById('mc').innerHTML=h;}
function openM(t,b){document.getElementById('mt').innerHTML=t;document.getElementById('mb').innerHTML=b;document.getElementById('modal').classList.add('show');}
function closeM(){document.getElementById('modal').classList.remove('show');}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeM();});
function msg(m,ok){var d=document.createElement('div');d.className='alert '+(ok?'av':'ae');d.textContent=m;d.style.cssText='position:fixed;bottom:20px;right:20px;z-index:999;max-width:320px;box-shadow:0 4px 20px rgba(0,0,0,.3)';document.body.appendChild(d);setTimeout(function(){d.remove();},2500);}

// ═══ TABLEAU DE BORD ═══
function pgDb(){
  ST('📊 Tableau de bord — '+shopName());SA('');
  var d=db();
  var ca=d.caisse.filter(function(c){return c.tp==='entree';}).reduce(function(a,b){return a+b.mt;},0);
  var cd=d.caisse.filter(function(c){return c.tp==='sortie';}).reduce(function(a,b){return a+b.mt;},0);
  var vt=d.ventes.reduce(function(a,b){return a+b.total;},0);
  var lows=d.produits.filter(function(p){return p.qte<=p.min;});
  var h='<div class="sg">';
  h+='<div class="sc or"><div class="sc-n">'+d.produits.length+'</div><div class="sc-l">Produits en stock</div><div class="sc-i">📦</div></div>';
  h+='<div class="sc v"><div class="sc-n">'+d.ventes.length+'</div><div class="sc-l">Ventes effectuées</div><div class="sc-i">🛒</div></div>';
  h+='<div class="sc b"><div class="sc-n">'+fmt(vt)+'</div><div class="sc-l">Chiffre d\'affaires</div><div class="sc-i">💰</div></div>';
  h+='<div class="sc r"><div class="sc-n">'+lows.length+'</div><div class="sc-l">Stocks critiques</div><div class="sc-i">⚠️</div></div>';
  h+='</div>';
  h+='<div class="g2">';
  // Caisse
  h+='<div class="card"><div class="card-t">💰 État de la caisse</div>';
  h+='<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="color:#d0d8f0">Entrées totales</span><span style="color:#00b87a;font-weight:700">+'+fmt(ca)+'</span></div>';
  h+='<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="color:#d0d8f0">Sorties totales</span><span style="color:#e74c3c;font-weight:700">-'+fmt(cd)+'</span></div>';
  h+='<div style="border-top:1px solid rgba(255,255,255,.08);padding-top:8px;display:flex;justify-content:space-between"><span style="color:#fff;font-weight:700">Solde</span><span style="color:#f0b429;font-weight:800;font-size:1.1rem">'+fmt(ca-cd)+'</span></div>';
  h+='<button class="btn btn-or btn-sm" style="margin-top:12px;width:100%" onclick="go(\'caisse\')">Voir la caisse →</button></div>';
  // Stock critique
  h+='<div class="card"><div class="card-t">⚠️ Stocks critiques ('+lows.length+')</div>';
  if(lows.length){
    lows.forEach(function(p){
      h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px;background:rgba(231,76,60,.08);border-radius:8px;margin-bottom:6px">';
      h+='<div><div style="font-size:.86rem;font-weight:600;color:#fff">'+p.nom+'</div><div style="font-size:.74rem;color:#d0d8f0">Min: '+p.min+'</div></div>';
      h+='<span class="badge br">'+p.qte+' restants</span></div>';
    });
  } else {h+='<div class="empty"><div class="empty-i">✅</div><p>Tous les stocks sont OK</p></div>';}
  h+='</div></div>';
  // Dernières ventes
  h+='<div class="card"><div class="card-t">🛒 Dernières ventes</div>';
  var dv=d.ventes.slice().reverse().slice(0,6);
  if(dv.length){
    h+='<table><thead><tr><th>Date</th><th>Client</th><th>Articles</th><th>Total</th><th>Statut</th></tr></thead><tbody>';
    dv.forEach(function(v){
      h+='<tr><td style="font-size:.78rem;color:#d0d8f0">'+new Date(v.dt).toLocaleDateString('fr-FR')+'</td>';
      h+='<td style="font-size:.84rem">'+v.client+'</td>';
      h+='<td><span class="badge bb">'+v.items.length+' art.</span></td>';
      h+='<td style="color:#f0b429;font-weight:700">'+fmt(v.total)+'</td>';
      h+='<td><span class="badge '+(v.paye?'bv':'br')+'">'+(v.paye?'Payé':'Crédit')+'</span></td></tr>';
    });
    h+='</tbody></table>';
  } else {h+='<div class="empty"><div class="empty-i">🛒</div><p>Aucune vente enregistrée</p></div>';}
  h+='</div>';
  SC(h);
}

// ═══ STOCK ═══
function pgStock(){
  ST('📦 Stock & Produits — '+shopName());
  SA('<button class="btn btn-or btn-sm" onclick="mNewProd()">+ Nouveau produit</button>');
  var d=db();
  var h='<div class="g3" style="margin-bottom:16px">';
  h+='<div style="padding:12px;background:rgba(201,146,42,.1);border:1px solid rgba(201,146,42,.2);border-radius:10px;text-align:center">';
  h+='<div style="font-size:1.5rem;font-weight:800;color:#f0b429">'+d.produits.length+'</div><div style="font-size:.76rem;color:#d0d8f0">Total produits</div></div>';
  h+='<div style="padding:12px;background:rgba(0,184,122,.1);border:1px solid rgba(0,184,122,.2);border-radius:10px;text-align:center">';
  var vStock=d.produits.reduce(function(a,p){return a+p.qte*p.pu_achat;},0);
  h+='<div style="font-size:1.5rem;font-weight:800;color:#00b87a">'+fmt(vStock)+'</div><div style="font-size:.76rem;color:#d0d8f0">Valeur du stock</div></div>';
  h+='<div style="padding:12px;background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.2);border-radius:10px;text-align:center">';
  h+='<div style="font-size:1.5rem;font-weight:800;color:#e74c3c">'+d.produits.filter(function(p){return p.qte<=p.min;}).length+'</div><div style="font-size:.76rem;color:#d0d8f0">Stocks critiques</div></div>';
  h+='</div>';
  h+='<div class="card"><div class="card-t">📦 Liste des produits</div>';
  // Filtre catégorie
  var cats=[...new Set(d.produits.map(function(p){return p.cat;}))];
  h+='<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">';
  h+='<button class="btn btn-g btn-sm" onclick="filterStock(\'all\')">Tous</button>';
  cats.forEach(function(c){h+='<button class="btn btn-g btn-sm" onclick="filterStock(\''+c+'\')">'+c+'</button>';});
  h+='<input type="text" id="search-stock" placeholder="🔍 Rechercher..." onkeyup="searchStock()" style="margin-left:auto;padding:6px 12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#fff;width:180px">';
  h+='</div>';
  if(d.produits.length){
    h+='<div style="overflow-x:auto"><table id="tbl-stock"><thead><tr><th>Réf</th><th>Produit</th><th>Catégorie</th><th>Qté</th><th>P. Achat</th><th>P. Vente</th><th>Fournisseur</th><th>Statut</th><th>Actions</th></tr></thead><tbody>';
    d.produits.forEach(function(p){
      var low=p.qte<=p.min;
      h+='<tr class="'+(low?'stock-low':'stock-ok')+'" data-cat="'+p.cat+'" data-nom="'+p.nom.toLowerCase()+'">';
      h+='<td style="font-family:monospace;font-size:.8rem;color:#f0b429">'+p.ref+'</td>';
      h+='<td><b style="color:#fff">'+p.nom+'</b></td>';
      h+='<td><span class="badge bor">'+p.cat+'</span></td>';
      h+='<td style="font-weight:700;color:'+(low?'#e74c3c':'#00b87a')+'">'+p.qte+'</td>';
      h+='<td style="color:#d0d8f0">'+fmt(p.pu_achat)+'</td>';
      h+='<td style="color:#f0b429;font-weight:700">'+fmt(p.pu_vente)+'</td>';
      h+='<td style="font-size:.8rem;color:#d0d8f0">'+p.fournisseur+'</td>';
      h+='<td><span class="badge '+(low?'br':'bv')+'">'+(low?'⚠️ Critique':'✅ OK')+'</span></td>';
      h+='<td style="display:flex;gap:5px">';
      h+='<button class="btn btn-b btn-sm" onclick="mEditProd('+p.id+')">✏️</button>';
      h+='<button class="btn btn-v btn-sm" onclick="mEntree('+p.id+')">+📦</button>';
      h+='<button class="btn btn-r btn-sm" onclick="delProd('+p.id+')">🗑️</button>';
      h+='</td></tr>';
    });
    h+='</tbody></table></div>';
  } else {h+='<div class="empty"><div class="empty-i">📦</div><p>Aucun produit. Ajoutez votre premier produit !</p></div>';}
  h+='</div>';SC(h);
}
function filterStock(cat){
  document.querySelectorAll('#tbl-stock tbody tr').forEach(function(tr){
    tr.style.display=(cat==='all'||tr.dataset.cat===cat)?'':'none';
  });
}
function searchStock(){
  var q=document.getElementById('search-stock').value.toLowerCase();
  document.querySelectorAll('#tbl-stock tbody tr').forEach(function(tr){
    tr.style.display=tr.dataset.nom&&tr.dataset.nom.includes(q)?'':'none';
  });
}
function mNewProd(){
  var d=db();
  var fo=d.fournisseurs.map(function(f){return '<option>'+f.nom+'</option>';}).join('');
  openM('➕ Nouveau produit',
    '<div class="g2"><div class="fg"><label>Référence</label><input type="text" id="pr" placeholder="QC001"></div>'
    +'<div class="fg"><label>Catégorie</label><input type="text" id="pcat" placeholder="Outils"></div></div>'
    +'<div class="fg"><label>Nom du produit *</label><input type="text" id="pn" placeholder="Ex: Marteau 500g"></div>'
    +'<div class="g2"><div class="fg"><label>Quantité initiale</label><input type="number" id="pq" value="0" min="0"></div>'
    +'<div class="fg"><label>Stock minimum (alerte)</label><input type="number" id="pm" value="5" min="0"></div></div>'
    +'<div class="g2"><div class="fg"><label>Prix d\'achat (FCFA)</label><input type="number" id="pa2" value="0" min="0"></div>'
    +'<div class="fg"><label>Prix de vente (FCFA)</label><input type="number" id="pv" value="0" min="0"></div></div>'
    +'<div class="fg"><label>Fournisseur</label><select id="pf"><option value="">-- Aucun --</option>'+fo+'</select></div>'
    +'<button class="btn btn-or btn-full" onclick="crProd()">✅ Ajouter le produit</button>');
}
function crProd(){
  var d=db();
  var n=document.getElementById('pn').value.trim();
  if(!n)return msg('Entrez le nom du produit.');
  var p={id:nextId(d.produits),ref:document.getElementById('pr').value||'P'+Date.now(),nom:n,cat:document.getElementById('pcat').value||'Général',
    qte:parseInt(document.getElementById('pq').value)||0,min:parseInt(document.getElementById('pm').value)||5,
    pu_achat:parseInt(document.getElementById('pa2').value)||0,pu_vente:parseInt(document.getElementById('pv').value)||0,
    fournisseur:document.getElementById('pf').value||'—',dt:new Date().toISOString()};
  d.produits.push(p);closeM();pgStock();msg('✅ Produit ajouté !',true);saveData();
}
function mEditProd(id){
  var d=db();var p=d.produits.find(function(x){return x.id===id;});if(!p)return;
  var fo=d.fournisseurs.map(function(f){return '<option'+(f.nom===p.fournisseur?' selected':'')+'>'+f.nom+'</option>';}).join('');
  openM('✏️ Modifier — '+p.nom,
    '<div class="g2"><div class="fg"><label>Référence</label><input type="text" id="epr" value="'+p.ref+'"></div>'
    +'<div class="fg"><label>Catégorie</label><input type="text" id="epcat" value="'+p.cat+'"></div></div>'
    +'<div class="fg"><label>Nom du produit</label><input type="text" id="epn" value="'+p.nom+'"></div>'
    +'<div class="g2"><div class="fg"><label>Quantité</label><input type="number" id="epq" value="'+p.qte+'"></div>'
    +'<div class="fg"><label>Stock minimum</label><input type="number" id="epm" value="'+p.min+'"></div></div>'
    +'<div class="g2"><div class="fg"><label>Prix achat (FCFA)</label><input type="number" id="epa" value="'+p.pu_achat+'"></div>'
    +'<div class="fg"><label>Prix vente (FCFA)</label><input type="number" id="epv" value="'+p.pu_vente+'"></div></div>'
    +'<div class="fg"><label>Fournisseur</label><select id="epf"><option value="">-- Aucun --</option>'+fo+'</select></div>'
    +'<button class="btn btn-or btn-full" onclick="svProd('+id+')">💾 Sauvegarder</button>');
}
function svProd(id){
  var d=db();var p=d.produits.find(function(x){return x.id===id;});if(!p)return;
  p.ref=document.getElementById('epr').value;p.cat=document.getElementById('epcat').value;
  p.nom=document.getElementById('epn').value;p.qte=parseInt(document.getElementById('epq').value)||0;
  p.min=parseInt(document.getElementById('epm').value)||0;p.pu_achat=parseInt(document.getElementById('epa').value)||0;
  p.pu_vente=parseInt(document.getElementById('epv').value)||0;p.fournisseur=document.getElementById('epf').value;
  closeM();pgStock();msg('✅ Produit mis à jour !',true);saveData();
}
function mEntree(id){
  var d=db();var p=d.produits.find(function(x){return x.id===id;});if(!p)return;
  openM('📦 Entrée de stock — '+p.nom,
    '<div style="padding:12px;background:rgba(201,146,42,.08);border-radius:8px;margin-bottom:14px">'
    +'<div style="font-size:.84rem;color:#d0d8f0">Stock actuel : <b style="color:#f0b429">'+p.qte+' unités</b></div></div>'
    +'<div class="fg"><label>Quantité à ajouter</label><input type="number" id="eq" value="1" min="1"></div>'
    +'<div class="fg"><label>Prix unitaire achat (FCFA)</label><input type="number" id="epa2" value="'+p.pu_achat+'" min="0"></div>'
    +'<div class="fg"><label>Fournisseur</label><input type="text" id="eff" value="'+p.fournisseur+'"></div>'
    +'<div class="fg"><label>Note</label><input type="text" id="eno" placeholder="Ex: Livraison du 01/07"></div>'
    +'<button class="btn btn-or btn-full" onclick="svEntree('+id+')">📦 Enregistrer l\'entrée</button>');
}
function svEntree(id){
  var d=db();var p=d.produits.find(function(x){return x.id===id;});if(!p)return;
  var q=parseInt(document.getElementById('eq').value)||0;
  var pu=parseInt(document.getElementById('epa2').value)||0;
  if(q<=0)return msg('Quantité invalide.');
  p.qte+=q;p.pu_achat=pu;
  d.achats.push({id:nextId(d.achats),prod_id:id,produit:p.nom,qte:q,pu:pu,total:q*pu,
    fournisseur:document.getElementById('eff').value,note:document.getElementById('eno').value,dt:new Date().toISOString()});
  d.caisse.push({id:nextId(d.caisse),tp:'sortie',desc:'Achat — '+p.nom+' ('+q+' u.)',mt:q*pu,dt:new Date().toISOString()});
  closeM();pgStock();msg('✅ Entrée enregistrée ! Stock : '+p.qte,true);saveData();
}
function delProd(id){
  if(!confirm('Supprimer ce produit ?'))return;
  var d=db();d.produits=d.produits.filter(function(x){return x.id!==id;});
  pgStock();msg('Produit supprimé.',true);saveData();
}

// ═══ VENTE ═══
var PANIER=[];
function pgVente(){
  ST('🛒 Point de Vente — '+shopName());SA('');
  var d=db();
  var h='<div class="g2">';
  // Catalogue produits
  h+='<div class="card"><div class="card-t">📦 Sélectionner un produit</div>';
  h+='<input type="text" id="sv" placeholder="🔍 Rechercher un produit..." onkeyup="filtProd()" style="width:100%;padding:8px 12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#fff;margin-bottom:12px">';
  h+='<div id="prod-list" style="max-height:400px;overflow-y:auto">';
  d.produits.forEach(function(p){
    h+='<div class="prod-item" data-nom="'+p.nom.toLowerCase()+'" onclick="addPanier('+p.id+')" style="padding:10px;background:rgba(255,255,255,.03);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all .2s;'+(p.qte<=0?'opacity:.5;pointer-events:none':'')+'" onmouseover="this.style.background=\'rgba(201,146,42,.1)\'" onmouseout="this.style.background=\'rgba(255,255,255,.03)\'">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center">';
    h+='<div><div style="font-weight:600;font-size:.88rem;color:#fff">'+p.nom+'</div>';
    h+='<div style="font-size:.74rem;color:#d0d8f0">'+p.cat+' · Stock: <span style="color:'+(p.qte<=p.min?'#e74c3c':'#00b87a')+'">'+p.qte+'</span></div></div>';
    h+='<div style="text-align:right"><div style="font-weight:700;color:#f0b429">'+fmt(p.pu_vente)+'</div>';
    h+=(p.qte<=0?'<span class="badge br">Rupture</span>':'<span class="badge bv">Disponible</span>');
    h+='</div></div></div>';
  });
  h+='</div></div>';
  // Panier
  h+='<div><div class="card"><div class="card-t">🛒 Panier</div>';
  h+='<div class="fg"><label>Client</label><input type="text" id="vcli" placeholder="Nom du client ou Comptoir"></div>';
  h+='<div id="panier-items" style="min-height:80px;margin-bottom:12px"></div>';
  h+='<div style="border-top:1px solid rgba(255,255,255,.08);padding-top:12px">';
  h+='<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="color:#d0d8f0">Sous-total</span><span id="v-st" style="color:#fff">0 FCFA</span></div>';
  h+='<div style="display:flex;justify-content:space-between;margin-bottom:12px"><span style="color:#f0b429;font-weight:700;font-size:1.05rem">TOTAL</span><span id="v-tot" style="color:#f0b429;font-weight:800;font-size:1.1rem">0 FCFA</span></div>';
  h+='<div class="fg"><label>Mode de paiement</label>';
  h+='<select id="vmod"><option value="especes">💵 Espèces</option><option value="mobile">📱 Mobile Money</option><option value="credit">📋 Crédit (dette)</option></select></div>';
  h+='<div id="vrem-wrap" class="fg"><label>Montant reçu (FCFA)</label><input type="number" id="vrem" placeholder="0" oninput="calcMonnaie()"></div>';
  h+='<div id="v-monnaie" style="display:none;padding:10px;background:rgba(0,184,122,.1);border-radius:8px;margin-bottom:10px;font-size:.9rem"></div>';
  h+='<button class="btn btn-or btn-full" onclick="validerVente()" style="padding:13px;font-size:.95rem">💳 Valider la vente</button>';
  h+='<button class="btn btn-g btn-sm btn-full" style="margin-top:6px" onclick="viderPanier()">🗑️ Vider le panier</button>';
  h+='</div></div></div>';
  h+='</div>';
  SC(h);
  PANIER=[];renderPanier();
}
function filtProd(){
  var q=document.getElementById('sv').value.toLowerCase();
  document.querySelectorAll('.prod-item').forEach(function(el){
    el.style.display=el.dataset.nom.includes(q)?'':'none';
  });
}
function addPanier(id){
  var d=db();var p=d.produits.find(function(x){return x.id===id;});if(!p||p.qte<=0)return;
  var ex=PANIER.find(function(x){return x.id===id;});
  if(ex){if(ex.qte>=p.qte)return msg('Stock insuffisant !');ex.qte++;ex.total=ex.qte*ex.pu;}
  else PANIER.push({id:id,nom:p.nom,pu:p.pu_vente,qte:1,total:p.pu_vente});
  renderPanier();
}
function renderPanier(){
  var div=document.getElementById('panier-items');if(!div)return;
  if(!PANIER.length){div.innerHTML='<div style="text-align:center;color:#d0d8f0;padding:20px;font-size:.85rem">Cliquez sur un produit pour l\'ajouter</div>';
    document.getElementById('v-st').textContent='0 FCFA';
    document.getElementById('v-tot').textContent='0 FCFA';return;}
  var h='';var tot=0;
  PANIER.forEach(function(item){
    tot+=item.total;
    h+='<div class="panier-item"><div style="flex:1"><div style="font-size:.86rem;font-weight:600;color:#fff">'+item.nom+'</div>';
    h+='<div style="font-size:.76rem;color:#d0d8f0">'+fmt(item.pu)+' × '+item.qte+' = <b style="color:#f0b429">'+fmt(item.total)+'</b></div></div>';
    h+='<div style="display:flex;align-items:center;gap:5px">';
    h+='<button class="btn btn-r btn-sm" onclick="chgQte('+item.id+',-1)" style="padding:3px 8px">−</button>';
    h+='<span style="color:#fff;font-weight:700;min-width:24px;text-align:center">'+item.qte+'</span>';
    h+='<button class="btn btn-v btn-sm" onclick="chgQte('+item.id+',1)" style="padding:3px 8px">+</button>';
    h+='<button class="btn btn-r btn-sm" onclick="remItem('+item.id+')">✕</button></div></div>';
  });
  div.innerHTML=h;
  document.getElementById('v-st').textContent=fmt(tot);
  document.getElementById('v-tot').textContent=fmt(tot);
}
function chgQte(id,delta){
  var d=db();var p=d.produits.find(function(x){return x.id===id;});
  var item=PANIER.find(function(x){return x.id===id;});if(!item)return;
  item.qte+=delta;
  if(item.qte<=0){PANIER=PANIER.filter(function(x){return x.id!==id;});}
  else{if(p&&item.qte>p.qte)return msg('Stock insuffisant !');item.total=item.qte*item.pu;}
  renderPanier();
}
function remItem(id){PANIER=PANIER.filter(function(x){return x.id!==id;});renderPanier();}
function viderPanier(){PANIER=[];renderPanier();}
function calcMonnaie(){
  var tot=PANIER.reduce(function(a,b){return a+b.total;},0);
  var rem=parseInt(document.getElementById('vrem').value)||0;
  var m=document.getElementById('v-monnaie');
  if(rem>=tot){m.style.display='block';m.innerHTML='💵 Monnaie à rendre : <b style="color:#f0b429;font-size:1.1rem">'+fmt(rem-tot)+'</b>';}
  else{m.style.display='block';m.innerHTML='<span style="color:#e74c3c">⚠️ Montant insuffisant (manque '+fmt(tot-rem)+')</span>';}
}
function validerVente(){
  if(!PANIER.length)return msg('Le panier est vide !');
  var d=db();
  var cli=document.getElementById('vcli').value||'Comptoir';
  var mod=document.getElementById('vmod').value;
  var tot=PANIER.reduce(function(a,b){return a+b.total;},0);
  // Déduire le stock
  PANIER.forEach(function(item){
    var p=d.produits.find(function(x){return x.id===item.id;});
    if(p)p.qte-=item.qte;
  });

// ═══ SAUVEGARDE HYBRIDE (Firebase + localStorage) ═══
var COLLECTIONS = ['produits','ventes','achats','caisse','dettes','fournisseurs'];

function saveData(){
  // 1. Toujours sauvegarder en local (fonctionne hors ligne)
  try{
    localStorage.setItem('mb_db_b1', JSON.stringify(DB.b1));
    localStorage.setItem('mb_db_b2', JSON.stringify(DB.b2));
    localStorage.setItem('mb_save_dt', new Date().toISOString());
  }catch(e){}
  
  // 2. Si Firebase disponible, synchroniser en ligne
  if(FB_READY && db_fb){
    ['b1','b2'].forEach(function(b){
      COLLECTIONS.forEach(function(coll){
        saveToFirebase(b, coll, DB[b][coll]);
      });
    });
  }
  showSaveStatus();
}

function loadData(callback){
  // 1. Charger depuis localStorage immédiatement
  try{
    var b1=localStorage.getItem('mb_db_b1');
    var b2=localStorage.getItem('mb_db_b2');
    if(b1)DB.b1=JSON.parse(b1);
    if(b2)DB.b2=JSON.parse(b2);
  }catch(e){}
  
  // 2. Appeler callback immédiatement (pas d'attente Firebase)
  if(callback) callback();
  
  // 3. Charger depuis Firebase EN ARRIÈRE-PLAN (sans bloquer)
  if(FB_READY && db_fb){
    var loaded=0; var total=COLLECTIONS.length*2;
    ['b1','b2'].forEach(function(b){
      COLLECTIONS.forEach(function(coll){
        loadFromFirebase(b, coll, function(data){
          if(data) DB[b][coll]=data;
          loaded++;
          if(loaded>=total){
            try{
              localStorage.setItem('mb_db_b1', JSON.stringify(DB.b1));
              localStorage.setItem('mb_db_b2', JSON.stringify(DB.b2));
            }catch(e){}
            // Rafraîchir si déjà connecté
            if(SESSION) pgDb();
          }
        });
      });
    });
    // Écouter les changements en temps réel
    ['b1','b2'].forEach(function(b){
      COLLECTIONS.forEach(function(coll){
        listenFirebase(b, coll, function(data){
          DB[b][coll]=data;
          try{localStorage.setItem('mb_db_'+b, JSON.stringify(DB[b]));}catch(e){}
          if(SESSION){
            var cur=(SESSION.role===b||(SESSION.role==='admin'&&SESSION.activeShop===(b==='b1'?1:2)));
            if(cur) pgDb();
          }
        });
      });
    });
  }
}

function showSaveStatus(){
  var dt=localStorage.getItem('mb_save_dt')||new Date().toISOString();
  var el=document.getElementById('save-status');
  if(el) el.textContent='💾 '+new Date(dt).toLocaleString('fr-FR');
}

function appliquerFirebase(){
  var key=document.getElementById('fb-key').value.trim();
  var pid=document.getElementById('fb-pid').value.trim();
  var aid=document.getElementById('fb-aid').value.trim();
  if(!key||!pid||!aid)return msg('Remplissez tous les champs.');
  var cfg={
    apiKey:key,
    authDomain:pid+'.firebaseapp.com',
    projectId:pid,
    storageBucket:pid+'.appspot.com',
    messagingSenderId:'744248015779',
    appId:aid
  };
  localStorage.setItem('mb_fb_config', JSON.stringify(cfg));
  FIREBASE_CONFIG=cfg;
  var ok=initFirebase();
  if(ok){
    document.getElementById('fb-setup').remove();
    loadData(function(){selShop(1);});
    msg('✅ Firebase connecté ! Données synchronisées.',true);
  } else {
    msg('Erreur de connexion. Vérifiez vos informations.','err');
  }
}

function ignoreFirebase(){
  localStorage.setItem('mb_fb_ignore','1');
  document.getElementById('fb-setup').remove();
  loadData(function(){selShop(1);});
}
